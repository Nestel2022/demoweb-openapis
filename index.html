<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini App Auth Code</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin: 0 0 20px;
        font-size: 1.5rem;
      }

      button {
        margin-top: 12px;
        padding: 10px 14px;
        border: 0;
        border-radius: 4px;
        background: #0066cc;
        color: white;
        cursor: pointer;
      }

      .result {
        margin-top: 20px;
        padding: 15px;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        font-family: monospace;
        white-space: pre-wrap;
        word-break: break-all;
        min-height: 80px;
      }

      .status {
        margin-top: 10px;
        padding: 10px;
        border-radius: 4px;
        font-size: 0.9rem;
      }

      .status.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Mini App - OpenAPIs</h1>
      <button id="run-open-api" type="button">Consumir inquiryUserBasicInfo</button>
      <div id="result" class="result">Esperando ejecución...</div>
      <div id="status" class="status"></div>
    </div>

    <script src="https://appx/web-view.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
