<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini App Auth Code</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin: 0 0 20px;
        font-size: 1.5rem;
      }

      button {
        margin-top: 12px;
        padding: 10px 14px;
        border: 0;
        border-radius: 4px;
        background: #0066cc;
        color: white;
        cursor: pointer;
      }

      .result {
        margin-top: 20px;
        padding: 15px;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        font-family: monospace;
        white-space: pre-wrap;
        word-break: break-all;
        min-height: 80px;
      }

      .status {
        margin-top: 10px;
        padding: 10px;
        border-radius: 4px;
        font-size: 0.9rem;
      }

      .status.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .debug-panel {
        margin-top: 20px;
        border: 2px solid #0066cc;
        border-radius: 4px;
        overflow: hidden;
      }

      .debug-header {
        background: #0066cc;
        color: white;
        padding: 10px 15px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .debug-header button {
        margin: 0;
        padding: 5px 10px;
        font-size: 0.85rem;
        background: white;
        color: #0066cc;
      }

      .debug-logs {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: "Courier New", monospace;
        font-size: 0.8rem;
        padding: 15px;
        max-height: 400px;
        overflow-y: auto;
        border-top: 1px solid #0066cc;
        line-height: 1.4;
      }

      .debug-logs .log-entry {
        margin-bottom: 8px;
        padding: 5px;
        border-left: 3px solid #666;
      }

      .debug-logs .log-info {
        border-left-color: #0066cc;
        color: #4ec9b0;
      }

      .debug-logs .log-error {
        border-left-color: #f48771;
        color: #f48771;
      }

      .debug-logs .log-success {
        border-left-color: #6a9955;
        color: #6a9955;
      }

      .debug-logs .log-timestamp {
        color: #858585;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Mini App - OpenAPIs</h1>
      <button id="run-open-api" type="button">Consumir inquiryUserBasicInfo</button>
      <div id="result" class="result">Esperando ejecución...</div>
      <div id="status" class="status"></div>

      <div class="debug-panel">
        <div class="debug-header">
          🔍 LOGS EN TIEMPO REAL
          <button id="clear-logs" type="button">Limpiar</button>
        </div>
        <div id="debug-logs" class="debug-logs">
          <div class="log-entry log-info">
            <span class="log-timestamp">[INIT]</span> Sistema listo. Haz clic en el botón para iniciar.
          </div>
        </div>
      </div>
    </div>

    <script src="https://appx/web-view.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
